            - ubuntu-22.04

    empty/:
        summary: Verification tasks.

    qemu/:
        summary: Verification tasks.
        backends:
            - qemu

    not-qemu/:
        summary: Verification tasks.
        backends:
            - -qemu

    lxd/:
        summary: Verification tasks.
        backends:
            - lxd

    not-lxd/:
        summary: Verification tasks.
        backends:
            - -lxd

